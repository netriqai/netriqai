<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="250" height="250">
  <defs>
    <!-- Mask to create the perfectly circular structural cutout through the 'N' -->
    <mask id="cutout">
      <rect width="200" height="200" fill="white" />
      <circle cx="100" cy="100" r="48" fill="black" />
    </mask>

    <!-- Vibrant cyan to deep teal gradient for the eye iris -->
    <linearGradient id="irisGrad" x1="10%" y1="10%" x2="90%" y2="90%">
      <stop offset="0%" stop-color="#4BF0CD" />
      <stop offset="100%" stop-color="#14A083" />
    </linearGradient>
  </defs>

  <style>
    @keyframes eyeBreathing {
      0%, 100% {
        transform: scale(1);
      }
      50% {
        transform: scale(1.08);
      }
    }
    @keyframes pupilPulse {
      0%, 100% {
        transform: scale(1);
      }
      50% {
        transform: scale(0.9);
      }
    }
    @keyframes highlightFloat {
      0%, 100% {
        transform: translate(0px, 0px);
      }
      50% {
        transform: translate(1.5px, -1.5px);
      }
    }
    .iris-element {
      transform-origin: 100px 100px;
      animation: eyeBreathing 5s ease-in-out infinite;
    }
    .pupil-element {
      transform-origin: 100px 100px;
      animation: pupilPulse 5s ease-in-out infinite;
    }
    .highlight-element {
      transform-origin: 107px 93px;
      animation: highlightFloat 5s ease-in-out infinite;
    }
  </style>

  <!-- The Architectural 'N' Base (Black instead of White) -->
  <path fill="#000000" d="M 40,20 
                          L 80,20 
                          L 120,100 
                          L 160,20 
                          L 160,180 
                          L 120,180 
                          L 80,100 
                          L 40,180 Z" mask="url(#cutout)" />

  <!-- The Cybernetic Iris (Animated) -->
  <circle class="iris-element" cx="100" cy="100" r="36" fill="url(#irisGrad)" />

  <!-- The Dark Pupil (Animated) -->
  <circle class="pupil-element" cx="100" cy="100" r="14" fill="#162124" />

  <!-- The Luminous Highlight offset to the top-right (Animated) -->
  <circle class="highlight-element" cx="107" cy="93" r="4.5" fill="#FFFFFF" />
</svg>
