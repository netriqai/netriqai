<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="250" height="250">
  <defs>
    <!-- Mask to create the perfectly circular structural cutout through the 'N' -->
    <mask id="cutout">
      <rect width="200" height="200" fill="white" />
      <circle cx="100" cy="100" r="48" fill="black" />
    </mask>

    <!-- Vibrant cyan to deep teal gradient for the eye iris -->
    <linearGradient id="irisGrad" x1="10%" y1="10%" x2="90%" y2="90%">
      <stop offset="0%" stop-color="#4BF0CD" />
      <stop offset="100%" stop-color="#14A083" />
    </linearGradient>
  </defs>

  <!-- The Architectural 'N' Base (Black instead of White) -->
  <path fill="#000000" d="M 40,20 
                          L 80,20 
                          L 120,100 
                          L 160,20 
                          L 160,180 
                          L 120,180 
                          L 80,100 
                          L 40,180 Z" mask="url(#cutout)" />

  <!-- The Cybernetic Iris -->
  <circle cx="100" cy="100" r="36" fill="url(#irisGrad)" />

  <!-- The Dark Pupil -->
  <circle cx="100" cy="100" r="14" fill="#162124" />

  <!-- The Luminous Highlight offset to the top-right -->
  <circle cx="107" cy="93" r="4.5" fill="#FFFFFF" />
</svg>
